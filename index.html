<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 ENC — Building Healthy Communities in Eastern North Carolina</title>
  <meta name="description" content="360ENC is a nonprofit organization in Eastern NC dedicated to community health, civic engagement, and advocacy.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0d0f0e; --off-white: #f5f2ec; --warm-white: #faf8f4;
      --accent: #2d6a4f; --accent-light: #52b788; --text-dark: #1a1c1b;
      --text-mid: #404a45; --border: #e2ddd5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text-dark); line-height: 1.6; }
    .skip-link { position: absolute; top: -100px; left: 10px; background: var(--accent); color: white; padding: 10px; z-index: 1000; }
    .skip-link:focus { top: 10px; }
    nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5vw; background: rgba(250, 248, 244, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-mid); text-decoration: none; }
    .hero { min-height: 90vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--black); color: var(--off-white); padding-top: 80px; }
    .hero-content { padding: 10% 8%; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; }
    h1 em { color: var(--accent-light); font-style: italic; }
    .btn { display: inline-block; padding: 1rem 2rem; font-weight: 700; text-transform: uppercase; border-radius: 4px; text-decoration: none; transition: 0.3s; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; border: none; }
    @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } .nav-links { display: none; } }
  </style>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<nav>
  <a href="#" class="nav-logo">360 ENC</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#join">Volunteer</a></li>
    <li><a href="#donate" style="color: var(--accent);">Donate</a></li>
  </ul>
</nav>
<main id="main">
  <header class="hero">
    <div class="hero-content">
      <h1>Building <em>Healthy</em> Communities</h1>
      <p style="margin-bottom: 2rem; opacity: 0.8;">Raising awareness and funds to equip Eastern North Carolina with vital health resources.</p>
      <a href="#join" class="btn btn-primary" style="width: fit-content;">Get Involved</a>
    </div>
    <div style="background: url('https://images.squarespace-cdn.com/content/v1/65dbd06b61e70f3757889700/ef1cdf1d-98a9-4ea5-a416-ef88257d318a/423422440_781924703793362_2155797983027398765_n.jpg') center/cover; filter: grayscale(30%);"></div>
  </header>
  <section style="padding: 40px 5vw; background: var(--black);">
    <a class="weatherwidget-io" href="https://forecast7.com/en/35d11n77d04/new-bern/" data-label_1="NEW BERN, NC" data-theme="dark" data-basecolor="#161918" data-accent="#52b788">NEW BERN WEATHER</a>
    <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
  </section>
  <section id="join" style="padding: 100px 5vw; background: var(--black); text-align: center;">
    <div style="max-width: 800px; margin: 0 auto; background: var(--warm-white); padding: 10px; border-radius: 8px;">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfQEKegOwW29JYSSr5QCHBkUZ6hv7HjrYdbC-2tium4zESWxg/viewform?embedded=true" width="100%" height="1200" frameborder="0">Loading…</iframe>
    </div>
  </section>
</main>
</body>
</html>
